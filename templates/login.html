{% extends "base.html" %}
{% block content %}

{# Render login form (email + password) and link to registration #}
{# Minimal structure for clarity; relies on Flask flash messages in base.html #}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card border-0 shadow">
      <div class="card-body p-5">
        <h3 class="card-title text-center mb-4">Log in</h3>

        <form method="post" action="{{ url_for('login') }}" autocomplete="off">
          <!-- Email field -->
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              class="form-control form-control-lg"
              placeholder="you@example.com"
              required
              autocomplete="off"
            >
          </div>

          <!-- Password field -->
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              class="form-control form-control-lg"
              placeholder="••••••••"
              required
              autocomplete="off"
            >
          </div>

          <!-- Submit button - full width -->
          <div class="d-grid gap-2 mb-3">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold">Log in</button>
          </div>
        </form>

        <hr>

        <!-- Registration link -->
        <div class="text-center">
          <p class="mb-0 text-muted">
            No account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
