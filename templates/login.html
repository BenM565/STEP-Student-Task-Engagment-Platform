<!--
Initial layout structure and component scaffolding informed by AI-assisted tooling
(ChatGPT, OpenAI), following standard HTML and accessibility best practices.

Markup, content, and final structure were reviewed, adapted, and implemented
independently for the STEP Student Task Engagement Platform.
-->
{% extends "base.html" %}

{% block extra_css %}
<script>
  // Add animated background marker to body
  document.addEventListener('DOMContentLoaded', function() {
    document.body.setAttribute('data-animated-bg', '');
  });
</script>
{% endblock %}

{% block content %}

{# Render login form (email + password) and link to registration #}
{# Minimal structure for clarity; relies on Flask flash messages in base.html #}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card glass-card border-0 shadow-xl">
      <div class="card-body p-5">
        <h3 class="card-title text-center mb-4" style="color: var(--text-light);">Log in</h3>

        <form method="post" action="{{ url_for('login') }}" autocomplete="off">
          <!-- Email field -->
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold" style="color: var(--text-light);">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              class="form-control form-control-lg"
              placeholder="you@example.com"
              required
              autocomplete="off"
            >
          </div>

          <!-- Password field -->
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold" style="color: var(--text-light);">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              class="form-control form-control-lg"
              placeholder="••••••••"
              required
              autocomplete="off"
            >
          </div>

          <!-- Submit button - full width -->
          <div class="d-grid gap-2 mb-3">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold">Log in</button>
          </div>
        </form>

        <hr style="border-color: rgba(255, 255, 255, 0.2);">

        <!-- Registration link -->
        <div class="text-center">
          <p class="mb-0" style="color: rgba(255, 255, 255, 0.8);">
            No account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold" style="color: var(--primary-color);">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
