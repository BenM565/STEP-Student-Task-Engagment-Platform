<!--
Initial layout structure and component scaffolding informed by AI-assisted tooling
(ChatGPT, OpenAI), following standard HTML and accessibility best practices.

Markup, content, and final structure were reviewed, adapted, and implemented
independently for the STEP Student Task Engagement Platform.
-->
{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>My Task</h2>
    <hr>
    <h4>{{ task.title }}</h4>
    <p>{{ task.description }}</p>

    {% if task.media %}
        <div>
            <strong>Company Uploaded Media:</strong><br>
            <a href="{{ url_for('static', filename='uploads/' + task.media) }}" target="_blank">View Media</a>
        </div>
    {% endif %}

    <hr>
    {% if application.student_media %}
        <p><strong>Your submission:</strong> <a href="{{ url_for('static', filename='student_uploads/' + application.student_media) }}" target="_blank">View</a></p>
    {% else %}
        <form method="POST" action="{{ url_for('student_upload_project_media', application_id=application.id) }}">            <div class="form-group">
                <label for="student_file">Upload Your Work:</label>
                <input type="file" name="student_file" class="form-control-file" required>
            </div>
            <button type="submit" class="btn btn-primary mt-2">Submit</button>
        </form>
    {% endif %}
</div>
{% endblock %}
