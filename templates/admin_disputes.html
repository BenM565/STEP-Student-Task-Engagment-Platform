{% extends "base.html" %}
{% block content %}
<div class="container">
  <h2>My Disputes</h2>
  {% if disputes %}
    {% for dispute in disputes %}
      <div class="card mb-2">
        <div class="card-body">
          <h5>{{ dispute.title }}</h5>
          <span class="badge bg-warning">{{ dispute.status }}</span>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p>No disputes</p>
  {% endif %}
</div>
{% endblock %}
